<body class="bg-gray-100 text-gray-800 font-sans antialiased h-screen flex flex-col overflow-hidden">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const defaultHeroImage = 'https://via.placeholder.com/800x400.png?text=Hero+Image';
        const defaultCardImage = 'https://via.placeholder.com/400x300.png?text=Arte';

        const initialCards = Array(4).fill(null).map((_, i) => ({
            id: i,
            bannerTexto: 'Beneficios Alumni',
            imagen: '',
            linkGrande: '',
            categoria: '',
            titulo: '',
            descripcion: '',
            ctaTexto: 'Información',
            ctaIcono: 'fas fa-info-circle',
            ctaLink: ''
        }));

        const getMesAnioActual = () => {
            const meses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
            const fecha = new Date();
            return `${meses[fecha.getMonth()]} ${fecha.getFullYear()}`;
        };

        const getInitialStateFromHash = () => {
            const hash = window.location.hash;
            if (hash.startsWith('#config=')) {
                try {
                    let json;
                    const dataString = hash.replace('#config=', '');
                    if (window.LZString) {
                        const decompressed = window.LZString.decompressFromEncodedURIComponent(dataString);
                        if (decompressed) {
                            json = decompressed;
                        } else {
                            json = decodeURIComponent(atob(dataString));
                        }
                    } else {
                        json = decodeURIComponent(atob(dataString));
                    }
                    window.history.replaceState(null, null, window.location.pathname);
                    return JSON.parse(json);
                } catch (e) {
                    console.error("Error parsing config from URL", e);
                    return null;
                }
            }
            return null;
        };

        const sharedConfig = getInitialStateFromHash();

        const MIGRATION_DONE = localStorage.getItem('usfq_migrated_to_projects');
        let initialProjects = [];
        const savedProjectsStr = localStorage.getItem('usfq_projects');
        if (savedProjectsStr) {
            initialProjects = JSON.parse(savedProjectsStr);
        }

        let initialActiveId = localStorage.getItem('usfq_active_project_id');

        if (!MIGRATION_DONE && initialProjects.length === 0) {
            const oldMes = localStorage.getItem('usfq_mes') || getMesAnioActual();
            const oldHero = localStorage.getItem('usfq_heroImage') || '';
            const oldCE = localStorage.getItem('usfq_tarjetas_ce');
            const oldAlumni = localStorage.getItem('usfq_tarjetas_alumni');
            const oldTemplate = localStorage.getItem('usfq_template') || 'ce';
            const oldOverride = localStorage.getItem('usfq_overrideTexts');
            
            const migratedProject = {
                id: Date.now().toString(),
                name: 'Plantilla Original',
                data: {
                    m: oldMes,
                    h: oldHero,
                    t: oldTemplate,
                    tCE: oldCE ? JSON.parse(oldCE) : initialCards,
                    tA: oldAlumni ? JSON.parse(oldAlumni) : initialCards,
                    o: oldOverride ? JSON.parse(oldOverride) : {}
                }
            };
            initialProjects.push(migratedProject);
            initialActiveId = migratedProject.id;
            localStorage.setItem('usfq_migrated_to_projects', 'true');
        }

        if (sharedConfig) {
            const importProject = {
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                name: 'Importada: ' + new Date().toLocaleTimeString(),
                data: sharedConfig
            };
            initialProjects.push(importProject);
            initialActiveId = importProject.id;
            
            // Limpiar el hash de la URL para que si pegan otro link en la misma pestaña funcione
            window.location.hash = '';
        }

        // Si pegan un link con hash estando la app abierta, forzar recarga
        window.addEventListener('hashchange', () => {
            if (window.location.hash.startsWith('#config=')) {
                window.location.reload();
            }
        });

        if (initialProjects.length === 0) {
            const defaultProject = {
                id: Date.now().toString(),
                name: 'Plantilla 1',
                data: { m: getMesAnioActual(), h: '', t: 'ce', tCE: initialCards, tA: initialCards, o: {} }
            };
            initialProjects.push(defaultProject);
            initialActiveId = defaultProject.id;
        }

        localStorage.setItem('usfq_projects', JSON.stringify(initialProjects));
        localStorage.setItem('usfq_active_project_id', initialActiveId);

        const getActiveProjectData = () => {
            const p = initialProjects.find(p => p.id === initialActiveId);
            return p ? p.data : initialProjects[0].data;
        };

        const getInitialOverrideTexts = () => getActiveProjectData().o || {};
        const getInitialTemplate = () => getActiveProjectData().t || 'ce';
        const getInitialMes = () => getActiveProjectData().m || getMesAnioActual();
        const getInitialHeroImage = () => getActiveProjectData().h || '';
        const getInitialTarjetasCE = () => {
            let cards = getActiveProjectData().tCE;
            if (cards && Array.isArray(cards)) {
                return cards.map(card => card.ctaTexto === 'Inscribir' ? { ...card, ctaTexto: 'Inscríbete' } : card);
            }
            return initialCards;
        };
        const getInitialTarjetasAlumni = () => {
            let cards = getActiveProjectData().tA;
            if (cards && Array.isArray(cards)) {
                return cards;
            }
            return initialCards;
        };

        function App() {
            const [projects, setProjects] = useState(initialProjects);
            const [activeProjectId, setActiveProjectId] = useState(initialActiveId);
            const [isProjectsModalOpen, setIsProjectsModalOpen] = useState(false);
            const [editingProjectName, setEditingProjectName] = useState(null);
            
            const overrideTextsRef = useRef(getInitialOverrideTexts());
            const [templateType, setTemplateType] = useState(getInitialTemplate);
            const [mes, setMes] = useState(getInitialMes);
            const [heroImage, setHeroImage] = useState(getInitialHeroImage);
            const [tarjetasCE, setTarjetasCE] = useState(getInitialTarjetasCE);
            const [tarjetasAlumni, setTarjetasAlumni] = useState(getInitialTarjetasAlumni);

            const tarjetas = templateType === 'ce' ? tarjetasCE : tarjetasAlumni;
            const setTarjetas = templateType === 'ce' ? setTarjetasCE : setTarjetasAlumni;
            const [activeAccordion, setActiveAccordion] = useState(0);
            const [isMobilePreview, setIsMobilePreview] = useState(false);
            const [isCopied, setIsCopied] = useState(false);
            const [isVisualCopied, setIsVisualCopied] = useState(false);
            const [isLinkCopied, setIsLinkCopied] = useState(false);
            const [isDownloadingPDF, setIsDownloadingPDF] = useState(false);
            const [validationErrors, setValidationErrors] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [pendingAction, setPendingAction] = useState(null);
            const iframeRef = useRef();
            const scrollPosRef = useRef(0);

            const handleIframeLoad = () => {
                if (iframeRef.current && iframeRef.current.contentWindow) {
                    const win = iframeRef.current.contentWindow;
                    // Restaurar el scroll guardado
                    win.scrollTo(0, scrollPosRef.current);
                    
                    // Escuchar cambios en el scroll para guardarlos
                    win.addEventListener('scroll', () => {
                        scrollPosRef.current = win.pageYOffset;
                    });
                }
            };

            // Guardar proyecto completo
            const saveCurrentProject = (partialData = {}) => {
                setProjects(prev => {
                    const updated = prev.map(p => {
                        if (p.id === activeProjectId) {
                            return {
                                ...p,
                                data: {
                                    m: mes,
                                    h: heroImage,
                                    t: templateType,
                                    tCE: tarjetasCE,
                                    tA: tarjetasAlumni,
                                    o: overrideTextsRef.current,
                                    ...p.data,
                                    ...partialData
                                }
                            };
                        }
                        return p;
                    });
                    localStorage.setItem('usfq_projects', JSON.stringify(updated));
                    return updated;
                });
            };

            // Auto-guardado global de cualquier cambio
            useEffect(() => {
                saveCurrentProject({ m: mes, h: heroImage, t: templateType, tCE: tarjetasCE, tA: tarjetasAlumni });
            }, [mes, heroImage, templateType, tarjetasCE, tarjetasAlumni, activeProjectId]);

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data && event.data.type === 'TEXT_UPDATE') {
                        const { id, text } = event.data;
                        if (id.startsWith('card-')) {
                            const parts = id.split('-');
                            const field = parts[1];
                            const cardId = parseInt(parts[2]);
                            setTarjetasCE(prev => prev.map(t => t.id === cardId ? { ...t, [field]: text } : t));
                            setTarjetasAlumni(prev => prev.map(t => t.id === cardId ? { ...t, [field]: text } : t));
                        } else {
                            overrideTextsRef.current[id] = text;
                            saveCurrentProject({ o: overrideTextsRef.current });
                        }
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, [activeProjectId, mes, heroImage, templateType, tarjetasCE, tarjetasAlumni]);

            const switchProject = (id) => {
                const p = projects.find(p => p.id === id);
                if (!p) return;
                setActiveProjectId(id);
                localStorage.setItem('usfq_active_project_id', id);
                
                overrideTextsRef.current = p.data.o || {};
                setTemplateType(p.data.t || 'ce');
                setMes(p.data.m || getMesAnioActual());
                setHeroImage(p.data.h || '');
                setTarjetasCE(p.data.tCE || initialCards);
                setTarjetasAlumni(p.data.tA || initialCards);
                setIsProjectsModalOpen(false);
            };

            const createNewProject = () => {
                const newProj = {
                    id: Date.now().toString(),
                    name: 'Nueva Plantilla ' + (projects.length + 1),
                    data: { m: getMesAnioActual(), h: '', t: 'ce', tCE: initialCards, tA: initialCards, o: {} }
                };
                const updated = [...projects, newProj];
                setProjects(updated);
                localStorage.setItem('usfq_projects', JSON.stringify(updated));
                switchProject(newProj.id);
            };

            const deleteProject = (id) => {
                if (projects.length === 1) {
                    alert("No puedes borrar la única plantilla. Crea una nueva primero.");
                    return;
                }
                if (window.confirm("¿Estás seguro de borrar esta plantilla?")) {
                    const updated = projects.filter(p => p.id !== id);
                    setProjects(updated);
                    localStorage.setItem('usfq_projects', JSON.stringify(updated));
                    if (activeProjectId === id) {
                        switchProject(updated[0].id);
                    }
                }
            };

            const renameProject = (id, newName) => {
                const updated = projects.map(p => p.id === id ? { ...p, name: newName } : p);
                setProjects(updated);
                localStorage.setItem('usfq_projects', JSON.stringify(updated));
                setEditingProjectName(null);
            };


            const getEmoji = (iconClass) => {
                if (!iconClass) return '👉';
                if (iconClass.includes('whatsapp')) return '📱';
                if (iconClass.includes('info')) return 'ℹ️';
                if (iconClass.includes('edit')) return '✏️';
                if (iconClass.includes('calendar')) return '📅';
                if (iconClass.includes('link')) return '🔗';
                return '👉';
            };
            const IMGBB_API_KEY = '6d56fec57203671bd78ebae8f72b140c';
            const [isUploadingHero, setIsUploadingHero] = useState(false);
            const [uploadingCards, setUploadingCards] = useState({});

            const compressImage = (file, maxWidth = 800, quality = 0.8) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;

                            if (width > maxWidth) {
                                height = Math.round((maxWidth * height) / width);
                                width = maxWidth;
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            
                            // Fondo blanco para evitar fondos negros en PNGs transparentes
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            canvas.toBlob((blob) => {
                                resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", {
                                    type: 'image/jpeg',
                                    lastModified: Date.now()
                                }));
                            }, 'image/jpeg', quality);
                        };
                    };
                });
            };

            const uploadToImgBB = async (originalFile, onSuccess, onStart, onEnd) => {
                if (!originalFile) return;

                onStart();

                try {
                    // Comprimir la imagen antes de subirla
                    const compressedFile = await compressImage(originalFile, 800, 0.8);
                    
                    const formData = new FormData();
                    formData.append('image', compressedFile);

                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        onSuccess(data.data.url);
                    } else {
                        alert('Error al subir la imagen: ' + (data.error?.message || 'Revisa tu API Key.'));
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    alert('Error de conexión al subir la imagen o al comprimir.');
                } finally {
                    onEnd();
                }
            };

            const updateTarjeta = (id, field, value) => {
                setTarjetas(prev => prev.map(t => t.id === id ? { ...t, [field]: value } : t));
            };

            const removeTarjeta = (id) => {
                if (tarjetas.length <= 1) {
                    alert('Debe haber al menos una tarjeta en la plantilla.');
                    return;
                }
                setTarjetas(tarjetas.filter(t => t.id !== id));
            };

            const addTarjeta = () => {
                const newId = tarjetas.length > 0 ? Math.max(...tarjetas.map(t => t.id)) + 1 : 0;
                setTarjetas([...tarjetas, {
                    id: newId,
                    bannerTexto: 'Beneficios Alumni',
                    imagen: '',
                    linkGrande: '',
                    categoria: '',
                    titulo: '',
                    descripcion: '',
                    ctaTexto: 'Información',
                    ctaIcono: 'fas fa-info-circle',
                    ctaLink: ''
                }]);
                setActiveAccordion(newId);
            };

            const generateCEHTML = (isExport = false) => {
                const editableAttr = (id) => isExport ? '' : `contenteditable="true" data-editable-id="${id}"`;
                const getText = (id, defaultText) => overrideTextsRef.current[id] ?? defaultText;
                
                const scriptTag = isExport ? '' : `
                <style>
                    [contenteditable="true"] { outline: none; cursor: text; }
                    [contenteditable="true"]:hover { outline: 1px dashed #cccccc; }
                </style>
                <script>
                    document.addEventListener('focusout', function(e) {
                        if (e.target.hasAttribute('contenteditable')) {
                            const id = e.target.getAttribute('data-editable-id');
                            window.parent.postMessage({ type: 'TEXT_UPDATE', id: id, text: e.target.innerHTML }, '*');
                        }
                    });
                    document.addEventListener('click', function(e) {
                        if (e.target.hasAttribute('contenteditable') || e.target.closest('[contenteditable]')) {
                            e.preventDefault();
                        }
                    });
                <\/script>
                `;

                let tarjetasHTML = '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%;"><tbody>';
                for (let i = 0; i < tarjetas.length; i += 2) {
                    const t1 = tarjetas[i];
                    const t2 = tarjetas[i + 1];
                    tarjetasHTML += '<tr class="mobile-stack">';
                    
                    const renderCardCE = (t, isFullWidth) => `
                    <td ${!isFullWidth ? 'width="48%" class="card-stack"' : 'colspan="3" width="100%" class="card-stack"'} valign="top" align="center" style="padding-bottom: 30px;">
                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; border-collapse: separate; overflow: hidden; max-width: 350px; margin: 0 auto;">
                            <tr>
                                <td style="background-color: #f8fafc; border-bottom: 1px solid #e2e8f0; text-align: center; padding: 10px;">
                                    <a href="${t.linkGrande || '#'}" target="_blank" style="display: block;">
                                        <img src="${t.imagen || defaultCardImage}" alt="Arte" width="330" border="0" style="width: 100%; max-width: 330px; height: auto; display: block; margin: 0 auto;">
                                    </a>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding: 20px; text-align: left; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
                                    ${t.categoria ? `<div ${editableAttr(`card-categoria-${t.id}`)} style="color: #e11b22; font-weight: bold; font-size: 12px; text-transform: uppercase; margin-bottom: 8px;">${t.categoria}</div>` : ''}
                                    ${t.titulo ? `<h4 ${editableAttr(`card-titulo-${t.id}`)} style="color: #e11b22; font-weight: bold; font-size: 16px; margin: 0 0 8px 0;">${t.titulo}</h4>` : ''}
                                    ${t.descripcion ? `<p ${editableAttr(`card-descripcion-${t.id}`)} style="color: #6b7280; font-size: 14px; margin: 0 0 16px 0; line-height: 1.5;">${t.descripcion}</p>` : ''}
                                    
                                    <table cellpadding="0" cellspacing="0" border="0" align="center">
                                        <tr>
                                            <td align="center" bgcolor="#e11b22" style="border-radius: 8px;">
                                                <a href="${t.ctaLink || '#'}" target="_blank" style="display: inline-block; color: #ffffff; text-decoration: none; padding: 10px 20px; font-weight: bold; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px;">
                                                    ${getEmoji(t.ctaIcono)} ${t.ctaTexto || 'Me Interesa'}
                                                </a>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>
                    </td>`;

                    tarjetasHTML += renderCardCE(t1, !t2);
                    if (t2) {
                        tarjetasHTML += `<td width="4%" class="card-spacer" style="width: 4%;"></td>`;
                        tarjetasHTML += renderCardCE(t2, false);
                    }
                    tarjetasHTML += '</tr>';
                }
                tarjetasHTML += '</tbody></table>';

                return `<!DOCTYPE html>

<body style="background-color: #f3f4f6; margin: 0; padding: 32px 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #1f2937;">

        <tr>
            <td>
        <!-- HEADER -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#e11b22" style="background-color: #e11b22; color: #ffffff;">
            <tr class="mobile-stack">
                <td class="mobile-stack mobile-pad" style="padding: 24px 32px; text-align: left; box-sizing: border-box;" valign="middle">

                    <p ${editableAttr('ce-p1')} style="font-size: 14px; font-weight: bold; margin: 4px 0 0 0; letter-spacing: 2px; text-transform: uppercase;">${getText('ce-p1', 'Aliados VIP CE')}</p>

                    <span style="background-color: #ffffff; color: #e11b22; padding: 6px 16px; border-radius: 9999px; font-size: 14px; font-weight: bold; display: inline-block;">

                    </span>
                </td>
            </tr>
        </table>

        <!-- HERO SECTION -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr>
                <td align="center">
                    <img src="${heroImage || defaultHeroImage}" alt="Portada" width="768" border="0" style="width: 100%; max-width: 768px; height: auto; display: block; margin: 0 auto;">
                </td>
            </tr>
            <tr>
                <td bgcolor="#1a1a1a" align="center" style="background-color: #1a1a1a; padding: 32px; text-align: center; color: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">

                    hiddenIframe.style.width = '768px';
                    hiddenIframe.style.height = '2000px'; // Altura arbitraria grande para evitar scrollbars
                    hiddenIframe.style.position = 'absolute';
                    hiddenIframe.style.top = '-9999px';
                    hiddenIframe.style.left = '-9999px';
                    hiddenIframe.style.visibility = 'hidden';
                    hiddenIframe.style.border = 'none';
                    hiddenIframe.srcdoc = htmlString;
                    document.body.appendChild(hiddenIframe);

                    // Esperar a que el iframe cargue el contenido
                    await new Promise(resolve => {
                        hiddenIframe.onload = resolve;
                    });
                    
                    // Pausa adicional para fuentes/imágenes (ya en caché)
                    await new Promise(resolve => setTimeout(resolve, 300));

                    const hiddenDoc = hiddenIframe.contentWindow.document;
                    const mainTable = hiddenDoc.querySelector('table');
                    
                    // Altura exacta: tabla + 32px padding top + 32px padding bottom + 25px de sombra + 5px extra
                    const contentHeight = mainTable ? (mainTable.offsetHeight + 94) : (hiddenDoc.body.scrollHeight + 20);

                    const pdfWidth = 768;
                    const pdfHeight = contentHeight;

                    // Limpiar el DOM
                    document.body.removeChild(hiddenIframe);

                    // 3. Formato de nombre
                    const mesParts = mes.trim().split(' ');
                    const anio = mesParts.length > 1 ? mesParts[1] : new Date().getFullYear();
                    const nombreMes = mesParts[0] || 'MES';
                    const fileName = `${anio} ${nombreMes} FLASH NEWS ${templateType.toUpperCase()}.pdf`;

                    // 4. Configuración:
                    const opt = {
                        margin: 0,
                        filename: fileName,
                        image: { type: 'jpeg', quality: 1 },
                        html2canvas: { 
                            scale: 2, 
                            useCORS: true,
                            backgroundColor: '#f3f4f6'
                        },
                        jsPDF: { 
                            unit: 'px', 
                            format: [pdfWidth, pdfHeight], 
                            orientation: 'portrait' 
                        }
                    };

                    // Pasamos el string HTML directamente. html2pdf se encarga de crear
                    // su propio contexto de renderizado seguro y auto-escalarlo.
                    await window.html2pdf().set(opt).from(htmlString).save();

                } catch (error) {
                    console.error("Error al generar PDF:", error);
                    alert("Hubo un error al generar el PDF.");

                    setIsDownloadingPDF(false);

                                                        </div>
                                                    </div>
                                                    
                                                    <button onClick={() => removeTarjeta(tarjeta.id)} className="w-full mt-4 text-red-500 hover:text-red-700 font-bold text-sm py-2 px-4 rounded border border-red-500 hover:bg-red-50 transition-colors">
                                                        <i className="fas fa-trash-alt mr-2"></i> Eliminar Tarjeta
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={addTarjeta} className="mt-4 w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 rounded-xl hover:border-usfq-red hover:text-usfq-red transition-colors flex items-center justify-center font-medium">
                                    <i className="fas fa-plus mr-2"></i> Añadir Nueva Tarjeta
                                </button>
                            </div>

                        </div>

                        {/* Right Column: Preview */}
                        <div className="w-1/2 bg-gray-200 overflow-y-auto p-8 relative template-preview">
                            <div className="absolute top-4 right-6 flex space-x-0 z-20 shadow-sm rounded-lg overflow-hidden">
                                <button onClick={() => setIsMobilePreview(false)} className={`px-4 py-2 text-xs font-bold transition-colors ${!isMobilePreview ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-300'}`}>
                                    <i className="fas fa-desktop mr-1"></i> Desktop
                                </button>
                                <button onClick={() => setIsMobilePreview(true)} className={`px-4 py-2 text-xs font-bold transition-colors ${isMobilePreview ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border-y border-r border-gray-300'}`}>
                                    <i className="fas fa-mobile-alt mr-1"></i> Mobile
                                </button>
                            </div>
                            
                            {/* Rendered Template */}
                            {/* Rendered Template */}
                            <div style={{ maxWidth: isMobilePreview ? '375px' : '100%', margin: '0 auto', transition: 'max-width 0.3s ease', height: 'calc(100vh - 120px)', borderRadius: '16px', overflow: 'hidden', boxShadow: '0 20px 25px -5px rgba(0, 0, 0, 0.1)', backgroundColor: '#ffffff', border: '1px solid #e5e7eb' }}>
                                <iframe 
                                    ref={iframeRef}
                                    srcDoc={generateHTML(false)} 
                                    onLoad={handleIframeLoad}
                                    style={{ width: '100%', height: '100%', border: 'none' }}
                                    title="Preview"
                                />
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        /* Estilos globales para la UI (no para el email) */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</body>
</html>
