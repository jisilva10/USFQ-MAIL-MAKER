<body class="bg-gray-100 text-gray-800 font-sans antialiased h-screen flex flex-col overflow-hidden">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const defaultHeroImage = 'https://via.placeholder.com/800x400.png?text=Hero+Image';
        const defaultCardImage = 'https://via.placeholder.com/400x300.png?text=Arte';

        const initialCards = Array(4).fill(null).map((_, i) => ({
            id: i,
            imagen: '',
            linkGrande: '',
            categoria: '',
            titulo: '',
            descripcion: '',
            ctaTexto: 'Información',
            ctaIcono: 'fas fa-info-circle',
            ctaLink: ''
        }));

        const getMesAnioActual = () => {
            const meses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
            const fecha = new Date();
            return `${meses[fecha.getMonth()]} ${fecha.getFullYear()}`;
        };

        const getInitialStateFromHash = () => {
            const hash = window.location.hash;
            if (hash.startsWith('#config=')) {
                try {
                    let json;
                    const dataString = hash.replace('#config=', '');
                    if (window.LZString) {
                        const decompressed = window.LZString.decompressFromEncodedURIComponent(dataString);
                        if (decompressed) {
                            json = decompressed;
                        } else {
                            json = decodeURIComponent(atob(dataString));
                        }
                    } else {
                        json = decodeURIComponent(atob(dataString));
                    }
                    window.history.replaceState(null, null, window.location.pathname);
                    return JSON.parse(json);
                } catch (e) {
                    console.error("Error parsing config from URL", e);
                    return null;
                }
            }
            return null;
        };

        const sharedConfig = getInitialStateFromHash();

        const getInitialMes = () => {
            if (sharedConfig && sharedConfig.m) return sharedConfig.m;
            return localStorage.getItem('usfq_mes') || getMesAnioActual();
        };
        const getInitialHeroImage = () => {
            if (sharedConfig && sharedConfig.h !== undefined) return sharedConfig.h;
            return localStorage.getItem('usfq_heroImage') || '';
        };
        const getInitialTemplate = () => {
            if (sharedConfig && sharedConfig.t) return sharedConfig.t;
            return localStorage.getItem('usfq_template') || 'ce';
        };
        const getInitialTarjetas = (key, sharedKey) => {
            if (sharedConfig && sharedConfig[sharedKey]) return sharedConfig[sharedKey];
            const saved = localStorage.getItem(key);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed)) {
                        return parsed.map(card => {
                            if (card.ctaTexto === 'Inscribir') {
                                return { ...card, ctaTexto: 'Inscríbete' };
                            }
                            return card;
                        });
                    }
                    return parsed;
                } catch (e) {
                    return initialCards;
                }
            }
            return initialCards;
        };

        const getInitialOverrideTexts = () => {
            if (sharedConfig && sharedConfig.o) return sharedConfig.o;
            const saved = localStorage.getItem('usfq_overrideTexts');
            return saved ? JSON.parse(saved) : {};
        };

        function App() {
            const overrideTextsRef = useRef(getInitialOverrideTexts());
            const [templateType, setTemplateType] = useState(getInitialTemplate);
            const [mes, setMes] = useState(getInitialMes);
            const [heroImage, setHeroImage] = useState(getInitialHeroImage);
            const [tarjetasCE, setTarjetasCE] = useState(() => getInitialTarjetas('usfq_tarjetas_ce', 'tCE'));
            const [tarjetasAlumni, setTarjetasAlumni] = useState(() => getInitialTarjetas('usfq_tarjetas_alumni', 'tA'));

            const tarjetas = templateType === 'ce' ? tarjetasCE : tarjetasAlumni;
            const setTarjetas = templateType === 'ce' ? setTarjetasCE : setTarjetasAlumni;
            const [activeAccordion, setActiveAccordion] = useState(0);
            const [isMobilePreview, setIsMobilePreview] = useState(false);
            const [isCopied, setIsCopied] = useState(false);
            const [isLinkCopied, setIsLinkCopied] = useState(false);
            const [isDownloadingPDF, setIsDownloadingPDF] = useState(false);
            const [validationErrors, setValidationErrors] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isResetModalOpen, setIsResetModalOpen] = useState(false);
            const [pendingAction, setPendingAction] = useState(null);
            const iframeRef = useRef();
            const scrollPosRef = useRef(0);

            const handleIframeLoad = () => {
                if (iframeRef.current && iframeRef.current.contentWindow) {
                    const win = iframeRef.current.contentWindow;
                    // Restaurar el scroll guardado
                    win.scrollTo(0, scrollPosRef.current);
                    
                    // Escuchar cambios en el scroll para guardarlos
                    win.addEventListener('scroll', () => {
                        scrollPosRef.current = win.pageYOffset;
                    });
                }
            };

            useEffect(() => { localStorage.setItem('usfq_mes', mes); }, [mes]);
            useEffect(() => { localStorage.setItem('usfq_heroImage', heroImage); }, [heroImage]);
            useEffect(() => { localStorage.setItem('usfq_tarjetas_ce', JSON.stringify(tarjetasCE)); }, [tarjetasCE]);
            useEffect(() => { localStorage.setItem('usfq_tarjetas_alumni', JSON.stringify(tarjetasAlumni)); }, [tarjetasAlumni]);
            useEffect(() => { localStorage.setItem('usfq_template', templateType); }, [templateType]);

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data && event.data.type === 'TEXT_UPDATE') {
                        const { id, text } = event.data;
                        if (id.startsWith('card-')) {
                            const parts = id.split('-');
                            const field = parts[1];
                            const cardId = parseInt(parts[2]);
                            setTarjetasCE(prev => prev.map(t => t.id === cardId ? { ...t, [field]: text } : t));
                            setTarjetasAlumni(prev => prev.map(t => t.id === cardId ? { ...t, [field]: text } : t));
                        } else {
                            overrideTextsRef.current[id] = text;
                            localStorage.setItem('usfq_overrideTexts', JSON.stringify(overrideTextsRef.current));
                        }
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const handleReset = () => {
                // Conservamos el mes actual para no perder el progreso del periodo de trabajo
                overrideTextsRef.current = {};
                localStorage.removeItem('usfq_overrideTexts');
                if (templateType === 'ce') {
                    setHeroImage('');
                    setTarjetasCE(initialCards);
                    localStorage.removeItem('usfq_heroImage');
                    localStorage.removeItem('usfq_tarjetas_ce');
                } else {
                    setTarjetasAlumni(initialCards);
                    localStorage.removeItem('usfq_tarjetas_alumni');
                }
                setIsResetModalOpen(false);
                setActiveAccordion(0);
            };


            const getEmoji = (iconClass) => {
                if (!iconClass) return '👉';
                if (iconClass.includes('whatsapp')) return '📱';
                if (iconClass.includes('info')) return 'ℹ️';
                if (iconClass.includes('edit')) return '✏️';
                if (iconClass.includes('calendar')) return '📅';
                if (iconClass.includes('link')) return '🔗';
                return '👉';
            };
            const IMGBB_API_KEY = '6d56fec57203671bd78ebae8f72b140c';
            const [isUploadingHero, setIsUploadingHero] = useState(false);
            const [uploadingCards, setUploadingCards] = useState({});

            const compressImage = (file, maxWidth = 800, quality = 0.8) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;

                            if (width > maxWidth) {
                                height = Math.round((maxWidth * height) / width);
                                width = maxWidth;
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            
                            // Fondo blanco para evitar fondos negros en PNGs transparentes
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            canvas.toBlob((blob) => {
                                resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", {
                                    type: 'image/jpeg',
                                    lastModified: Date.now()
                                }));
                            }, 'image/jpeg', quality);
                        };
                    };
                });
            };

            const uploadToImgBB = async (originalFile, onSuccess, onStart, onEnd) => {
                if (!originalFile) return;

                onStart();

                try {
                    // Comprimir la imagen antes de subirla
                    const compressedFile = await compressImage(originalFile, 800, 0.8);
                    
                    const formData = new FormData();
                    formData.append('image', compressedFile);

                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        onSuccess(data.data.url);
                    } else {
                        alert('Error al subir la imagen: ' + (data.error?.message || 'Revisa tu API Key.'));
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    alert('Error de conexión al subir la imagen o al comprimir.');
                } finally {
                    onEnd();
                }
            };

            const updateTarjeta = (id, field, value) => {
                setTarjetas(prev => prev.map(t => t.id === id ? { ...t, [field]: value } : t));
            };

            const removeTarjeta = (id) => {
                if (tarjetas.length <= 1) {
                    alert('Debe haber al menos una tarjeta en la plantilla.');
                    return;
                }
                setTarjetas(tarjetas.filter(t => t.id !== id));
            };

            const addTarjeta = () => {
                const newId = tarjetas.length > 0 ? Math.max(...tarjetas.map(t => t.id)) + 1 : 0;
                setTarjetas([...tarjetas, {
                    id: newId,
                    imagen: '',
                    linkGrande: '',
                    categoria: '',
                    titulo: '',
                    descripcion: '',
                    ctaTexto: 'Información',
                    ctaIcono: 'fas fa-info-circle',
                    ctaLink: ''
                }]);
                setActiveAccordion(newId);
            };

            const generateCEHTML = (isExport = false) => {
                const editableAttr = (id) => isExport ? '' : `contenteditable="true" data-editable-id="${id}" style="outline: none; cursor: text;"`;
                const getText = (id, defaultText) => overrideTextsRef.current[id] ?? defaultText;
                
                const scriptTag = isExport ? '' : `
                <script>
                    document.addEventListener('focusout', function(e) {
                        if (e.target.hasAttribute('contenteditable')) {
                            const id = e.target.getAttribute('data-editable-id');
                            window.parent.postMessage({ type: 'TEXT_UPDATE', id: id, text: e.target.innerHTML }, '*');
                        }
                    });
                    document.addEventListener('click', function(e) {
                        if (e.target.hasAttribute('contenteditable') || e.target.closest('[contenteditable]')) {
                            e.preventDefault();
                        }
                    });
                <\/script>
                `;

                let tarjetasHTML = '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%; max-width: 100%;"><tbody>';
                for (let i = 0; i < tarjetas.length; i += 2) {
                    const t1 = tarjetas[i];
                    const t2 = tarjetas[i + 1];
                    tarjetasHTML += '<tr class="mobile-stack">';
                    
                    tarjetasHTML += `
                    <td ${t2 ? 'width="48%" class="card-stack"' : 'colspan="3" width="100%" class="card-stack"'} valign="top" align="center" style="padding-bottom: 30px;">
                        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden" style="width: 100%; max-width: 350px; margin: 0 auto; text-align: left;">
                            <a href="${t1.linkGrande || '#'}" target="_blank" class="block overflow-hidden" style="background-color: #f8fafc; text-align: center; border-bottom: 1px solid #e2e8f0; padding: 10px; display: block;">
                                <img src="${t1.imagen || defaultCardImage}" alt="Arte" width="330" border="0" style="width: 100%; max-width: 330px; height: auto; display: block; margin: 0 auto;">
                            </a>
                            <div class="p-5" style="padding: 20px;">
                                ${t1.categoria ? `<div ${editableAttr(`card-categoria-${t1.id}`)} class="text-usfq-red uppercase" style="color: #e11b22; font-weight: bold; font-size: 12px; margin-bottom: 8px;">${t1.categoria}</div>` : ''}
                                ${t1.titulo ? `<h4 ${editableAttr(`card-titulo-${t1.id}`)} class="text-gray-800 leading-tight" style="color: #1f2937; font-weight: bold; font-size: 16px; margin-top: 0; margin-bottom: 8px;">${t1.titulo}</h4>` : ''}
                                ${t1.descripcion ? `<p ${editableAttr(`card-descripcion-${t1.id}`)} class="text-gray-500" style="color: #6b7280; font-size: 14px; margin-top: 0; margin-bottom: 16px;">${t1.descripcion}</p>` : ''}
                                
                                <a href="${t1.ctaLink || '#'}" target="_blank" class="bg-usfq-red text-white" style="background-color: #e11b22; color: #ffffff; text-decoration: none; padding: 10px 15px; border-radius: 8px; display: block; text-align: center; font-weight: bold;">
                                    <span style="margin-right: 8px; font-size: 16px;">${getEmoji(t1.ctaIcono)}</span> <span ${editableAttr(`card-ctaTexto-${t1.id}`)}>${t1.ctaTexto || 'Me Interesa'}</span>
                                </a>
                            </div>
                        </div>
                    </td>`;

                    if (t2) {
                        tarjetasHTML += `<td width="4%" class="card-spacer" style="width: 4%;"></td>`;
                        tarjetasHTML += `
                    <td width="48%" class="card-stack" valign="top" align="center" style="padding-bottom: 30px;">
                        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden" style="width: 100%; max-width: 350px; margin: 0 auto; text-align: left;">
                            <a href="${t2.linkGrande || '#'}" target="_blank" class="block overflow-hidden" style="background-color: #f8fafc; text-align: center; border-bottom: 1px solid #e2e8f0; padding: 10px; display: block;">
                                <img src="${t2.imagen || defaultCardImage}" alt="Arte" width="330" border="0" style="width: 100%; max-width: 330px; height: auto; display: block; margin: 0 auto;">
                            </a>
                            <div class="p-5" style="padding: 20px;">
                                ${t2.categoria ? `<div ${editableAttr(`card-categoria-${t2.id}`)} class="text-usfq-red uppercase" style="color: #e11b22; font-weight: bold; font-size: 12px; margin-bottom: 8px;">${t2.categoria}</div>` : ''}
                                ${t2.titulo ? `<h4 ${editableAttr(`card-titulo-${t2.id}`)} class="text-gray-800 leading-tight" style="color: #1f2937; font-weight: bold; font-size: 16px; margin-top: 0; margin-bottom: 8px;">${t2.titulo}</h4>` : ''}
                                ${t2.descripcion ? `<p ${editableAttr(`card-descripcion-${t2.id}`)} class="text-gray-500" style="color: #6b7280; font-size: 14px; margin-top: 0; margin-bottom: 16px;">${t2.descripcion}</p>` : ''}
                                
                                <a href="${t2.ctaLink || '#'}" target="_blank" class="bg-usfq-red text-white" style="background-color: #e11b22; color: #ffffff; text-decoration: none; padding: 10px 15px; border-radius: 8px; display: block; text-align: center; font-weight: bold;">
                                    <span style="margin-right: 8px; font-size: 16px;">${getEmoji(t2.ctaIcono)}</span> <span ${editableAttr(`card-ctaTexto-${t2.id}`)}>${t2.ctaTexto || 'Me Interesa'}</span>
                                </a>
                            </div>
                        </div>
                    </td>`;
                    }
                    tarjetasHTML += '</tr>';
                }
                tarjetasHTML += '</tbody></table>';

                return `<!DOCTYPE html>

                                <div className="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden transform transition-all">
                                    <div className="bg-red-50 p-4 flex justify-between items-center border-b border-red-100">
                                        <h3 className="text-red-800 font-bold flex items-center"><i className="fas fa-exclamation-triangle mr-2"></i> Información Faltante</h3>
                                        <button onClick={() => setIsModalOpen(false)} className="text-red-500 hover:text-red-800 transition-colors">
                                            <i className="fas fa-times text-lg"></i>
                                        </button>
                                    </div>
                                    <div className="p-5">
                                        <p className="text-gray-700 mb-4 text-sm">Por favor completa los siguientes campos obligatorios antes de exportar:</p>
                                        <ul className="list-disc pl-5 space-y-1 text-sm text-gray-600">
                                            {validationErrors.map((err, i) => <li key={i}>{err}</li>)}
                                        </ul>
                                        <div className="mt-6 flex justify-end space-x-3">
                                            <button onClick={() => setIsModalOpen(false)} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors">Cancelar</button>
                                            <button onClick={() => pendingAction === 'pdf' ? forceDownloadPDF() : forceExportHTML()} className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition-colors">
                                                {pendingAction === 'pdf' ? 'Descargar de todos modos' : 'Copiar de todos modos'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Reset Confirmation Modal */}
                        {isResetModalOpen && (
                            <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden transform transition-all animate-in fade-in zoom-in duration-200">
                                    <div className="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-800">
                                        <h3 className="text-white font-bold flex items-center"><i className="fas fa-file-circle-plus mr-2 text-usfq-red"></i> Nuevo Correo</h3>
                                        <button onClick={() => setIsResetModalOpen(false)} className="text-gray-400 hover:text-white transition-colors">
                                            <i className="fas fa-times text-lg"></i>
                                        </button>
                                    </div>
                                    <div className="p-6 text-center">
                                        <div className="w-16 h-16 bg-red-50 text-usfq-red rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                                            <i className="fas fa-trash-can"></i>
                                        </div>
                                        <h4 className="text-xl font-bold text-gray-900 mb-2">¿Estás seguro?</h4>
                                        <p className="text-gray-600 mb-6 text-sm">
                                            Esta acción <strong>borrará las imágenes y tarjetas actuales</strong>. El campo de Fecha (Mes y Año) se mantendrá igual. ¿Deseas continuar?
                                        </p>
                                        <div className="flex justify-center space-x-3">
                                            <button onClick={() => setIsResetModalOpen(false)} className="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-200 transition-colors">
                                                No, mantener actual
                                            </button>
                                            <button onClick={handleReset} className="px-5 py-2.5 bg-usfq-red text-white rounded-lg text-sm font-bold hover:bg-red-700 transition-all shadow-lg shadow-red-200">
                                                Sí, borrar contenido
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        
                        {/* Left Column: Editor */}
                        <div className="w-1/2 bg-white border-r border-gray-200 overflow-y-auto p-6 custom-scrollbar">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6">Configuración</h2>
                            

                            {/* General Settings */}
                            <div className="bg-gray-50 p-5 rounded-xl border border-gray-200 mb-6">
                                <h3 className="text-lg font-bold text-usfq-red mb-4 border-b border-gray-200 pb-2"><i className="fas fa-cog mr-2"></i> General</h3>
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Mes y Año</label>
                                    <input 
                                        type="text" 
                                        value={mes} 
                                        onChange={(e) => setMes(e.target.value)}
                                        className="w-full p-2 border border-gray-300 rounded-md focus:ring-usfq-red focus:border-usfq-red"
                                        placeholder="MAYO 2026"
                                    />
                                </div>
                                
                                {templateType === 'ce' && (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Imagen de Portada (Hero URL o Subir)</label>
                                        <input 
                                            type="text" 
                                            value={heroImage} 
                                            onChange={(e) => setHeroImage(e.target.value)}
                                            className="w-full p-2 border border-gray-300 rounded-md focus:ring-usfq-red focus:border-usfq-red mb-2"
                                            placeholder="https://i.ibb.co/..."
                                        />
                                        <input 
                                            type="file" 
                                            accept="image/*"
                                            onChange={(e) => {
                                                if (e.target.files.length > 0) {
                                                    uploadToImgBB(e.target.files[0], setHeroImage, () => setIsUploadingHero(true), () => setIsUploadingHero(false));
                                                }
                                            }}
                                            className="w-full p-1 border border-gray-300 rounded-md file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-usfq-red hover:file:bg-red-100"
                                        />
                                        {isUploadingHero && <p className="text-xs text-blue-600 mt-2"><i className="fas fa-spinner fa-spin mr-1"></i> Subiendo a la nube...</p>}
                                        {heroImage && !isUploadingHero && <p className="text-xs text-green-600 mt-2"><i className="fas fa-check-circle mr-1"></i> ¡Imagen enlazada!</p>}
                                    </div>
                                )}
                            </div>

                            {/* Cards Settings */}
                            <div className="mb-8">
                                <h3 className="text-lg font-bold text-usfq-red mb-4 border-b border-gray-200 pb-2"><i className="fas fa-layer-group mr-2"></i> Tarjetas</h3>
                                
                                <div className="space-y-3">
                                    {tarjetas.map((tarjeta, index) => (
                                        <div key={tarjeta.id} className="border border-gray-200 rounded-xl overflow-hidden">
                                            <button 
                                                className={`w-full px-5 py-4 flex justify-between items-center text-left transition-colors ${activeAccordion === index ? 'bg-usfq-light text-usfq-red' : 'bg-gray-50 hover:bg-gray-100 text-gray-700'}`}
                                                onClick={() => setActiveAccordion(activeAccordion === index ? -1 : index)}
                                            >
                                                <span className="font-bold">Tarjeta {index + 1} {tarjeta.titulo ? `- ${tarjeta.titulo}` : ''}</span>
                                                <i className={`fas fa-chevron-${activeAccordion === index ? 'up' : 'down'}`}></i>
                                            </button>
                                            
                                            {activeAccordion === index && (
                                                <div className="p-5 bg-white border-t border-gray-100 space-y-4">
                                                    
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">Imagen de Tarjeta (Subir o URL)</label>
                                                            <input 
                                                                type="text" 
                                                                value={tarjeta.imagen} 
                                                                onChange={(e) => updateTarjeta(tarjeta.id, 'imagen', e.target.value)}
                                                                className="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-usfq-red focus:border-usfq-red mb-2"
                                                                placeholder="https://i.ibb.co/..."
                                                            />
                                                            <input 
                                                                type="file" 
                                                                accept="image/*"
                                                                onChange={(e) => {
                                                                    if (e.target.files.length > 0) {
                                                                        uploadToImgBB(
                                                                            e.target.files[0], 
                                                                            (url) => updateTarjeta(tarjeta.id, 'imagen', url),
                                                                            () => setUploadingCards(prev => ({ ...prev, [tarjeta.id]: true })),
                                                                            () => setUploadingCards(prev => ({ ...prev, [tarjeta.id]: false }))
                                                                        );
                                                                    }
                                                                }}
                                                                className="w-full text-sm text-gray-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-gray-50 file:text-gray-700 hover:file:bg-gray-100"
                                                            />
                                                            {uploadingCards[tarjeta.id] && <p className="text-xs text-blue-600 mt-2"><i className="fas fa-spinner fa-spin mr-1"></i> Subiendo a la nube...</p>}
                                                            {tarjeta.imagen && !uploadingCards[tarjeta.id] && <p className="text-xs text-green-600 mt-2"><i className="fas fa-check-circle mr-1"></i> ¡Imagen enlazada!</p>}
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">Link OneDrive</label>
                                                            <input 
                                                                type="url" 
                                                                value={tarjeta.linkGrande} 
                                                                onChange={(e) => updateTarjeta(tarjeta.id, 'linkGrande', e.target.value)}
                                                                className="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-usfq-red focus:border-usfq-red"
                                                                placeholder="https://..."
                                                            />
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">Título</label>
                                                            <input 
                                                                type="text" 
                                                                value={tarjeta.categoria} 
                                                                onChange={(e) => updateTarjeta(tarjeta.id, 'categoria', e.target.value)}
                                                                className="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-usfq-red focus:border-usfq-red"
                                                                placeholder="Título principal"
                                                            />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">Subtítulo</label>
                                                            <input 
                                                                type="text" 
                                                                value={tarjeta.titulo} 
                                                                onChange={(e) => updateTarjeta(tarjeta.id, 'titulo', e.target.value)}
                                                                className="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-usfq-red focus:border-usfq-red"
                                                                placeholder="Subtítulo de la tarjeta"
                                                            />
                                                        </div>
                                                    </div>

                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">Contenido</label>
                                                        <textarea 
                                                            value={tarjeta.descripcion} 
                                                            onChange={(e) => updateTarjeta(tarjeta.id, 'descripcion', e.target.value)}
                                                            className="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-usfq-red focus:border-usfq-red h-20 resize-none"
                                                            placeholder="Contenido de la tarjeta..."
                                                        ></textarea>
                                                    </div>

                                                    <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                                        <p className="text-xs font-bold text-gray-500 uppercase mb-3">Botón</p>
                                                        <div className="grid grid-cols-2 gap-3">
                                                            <div>
                                                                <label className="block text-xs font-medium text-gray-700 mb-1">Opciones</label>
                                                                <select 
                                                                    value={tarjeta.ctaIcono} 
                                                                    onChange={(e) => {
                                                                        const icon = e.target.value;
                                                                        let text = '';
                                                                        let link = tarjeta.ctaLink;
                                                                        
                                                                        if (icon === 'fab fa-whatsapp') {
                                                                            text = 'WhatsApp';
                                                                        } else if (icon === 'fas fa-info-circle') {
                                                                            text = 'Información';
                                                                        } else if (icon === 'fas fa-edit') {
                                                                            text = 'Inscríbete';
                                                                        } else if (icon === 'fas fa-calendar-alt') {
                                                                            text = 'Calendario';
                                                                        } else if (icon === 'fas fa-link') {
                                                                            text = 'Link';
                                                                        }
                                                                        
                                                                        updateTarjeta(tarjeta.id, 'ctaIcono', icon);
                                                                        updateTarjeta(tarjeta.id, 'ctaTexto', text);
                                                                        updateTarjeta(tarjeta.id, 'ctaLink', link);
                                                                    }}
                                                                    className="w-full p-1.5 text-sm border border-gray-300 rounded-md"
                                                                >
                                                                    <option value="fab fa-whatsapp">WhatsApp</option>
                                                                    <option value="fas fa-info-circle">Información</option>
                                                                    <option value="fas fa-edit">Inscríbete</option>
                                                                    <option value="fas fa-calendar-alt">Calendario</option>
                                                                    <option value="fas fa-link">Link</option>
                                                                </select>
                                                            </div>
                                                            <div>
                                                                <label className="block text-xs font-medium text-gray-700 mb-1">URL Link</label>
                                                                <input 
                                                                    type="url" 
                                                                    value={tarjeta.ctaLink} 
                                                                    onChange={(e) => updateTarjeta(tarjeta.id, 'ctaLink', e.target.value)}
                                                                    className="w-full p-1.5 text-sm border border-gray-300 rounded-md"
                                                                    placeholder="https://..."
                                                                />
                                                            </div>
                                                        </div>
                                                    </div>
                                                    
                                                    <button onClick={() => removeTarjeta(tarjeta.id)} className="w-full mt-4 text-red-500 hover:text-red-700 font-bold text-sm py-2 px-4 rounded border border-red-500 hover:bg-red-50 transition-colors">
                                                        <i className="fas fa-trash-alt mr-2"></i> Eliminar Tarjeta
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={addTarjeta} className="mt-4 w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 rounded-xl hover:border-usfq-red hover:text-usfq-red transition-colors flex items-center justify-center font-medium">
                                    <i className="fas fa-plus mr-2"></i> Añadir Nueva Tarjeta
                                </button>
                            </div>

                        </div>

                        {/* Right Column: Preview */}
                        <div className="w-1/2 bg-gray-200 overflow-y-auto p-8 relative template-preview">
                            <div className="absolute top-4 right-6 flex space-x-0 z-20 shadow-sm rounded-lg overflow-hidden">
                                <button onClick={() => setIsMobilePreview(false)} className={`px-4 py-2 text-xs font-bold transition-colors ${!isMobilePreview ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-300'}`}>
                                    <i className="fas fa-desktop mr-1"></i> Desktop
                                </button>
                                <button onClick={() => setIsMobilePreview(true)} className={`px-4 py-2 text-xs font-bold transition-colors ${isMobilePreview ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border-y border-r border-gray-300'}`}>
                                    <i className="fas fa-mobile-alt mr-1"></i> Mobile
                                </button>
                            </div>
                            
                            {/* Rendered Template */}
                            {/* Rendered Template */}
                            <div style={{ maxWidth: isMobilePreview ? '375px' : '100%', margin: '0 auto', transition: 'max-width 0.3s ease', height: 'calc(100vh - 120px)', borderRadius: '16px', overflow: 'hidden', boxShadow: '0 20px 25px -5px rgba(0, 0, 0, 0.1)', backgroundColor: '#ffffff', border: '1px solid #e5e7eb' }}>
                                <iframe 
                                    ref={iframeRef}
                                    srcDoc={generateHTML(false)} 
                                    onLoad={handleIframeLoad}
                                    style={{ width: '100%', height: '100%', border: 'none' }}
                                    title="Preview"
                                />
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        /* Estilos globales para la UI (no para el email) */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</body>
</html>
